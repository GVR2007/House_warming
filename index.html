<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gruhapravesham - Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Noto+Serif+Telugu:wght@400;700&family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  .poster {
    width: 700px;
    min-height: 980px;
    background: linear-gradient(160deg, #1c0900 0%, #3b1500 30%, #5c2200 50%, #3b1500 70%, #1c0900 100%);
    border: 3px solid #c8860a;
    position: relative;
    overflow: hidden;
    padding: 30px 40px 40px;
    box-shadow: 0 0 60px rgba(200,134,10,0.4), inset 0 0 80px rgba(0,0,0,0.5);
  }

  /* Decorative corner patterns */
  .corner {
    position: absolute;
    width: 110px;
    height: 110px;
    opacity: 0.85;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 0; left: 0; }
  .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner.br { bottom: 0; right: 0; transform: scale(-1); }

  /* Background rangoli pattern */
  .bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: repeating-conic-gradient(#f0c040 0% 25%, transparent 0% 50%);
    background-size: 40px 40px;
  }

  /* Glowing border inner */
  .inner-border {
    position: absolute;
    inset: 14px;
    border: 1.5px solid rgba(200,134,10,0.4);
    pointer-events: none;
  }

  /* Top floral band */
  .floral-band {
    text-align: center;
    font-size: 28px;
    color: #f0b030;
    letter-spacing: 8px;
    margin-bottom: 6px;
    opacity: 0.9;
  }

  /* Om symbol */
  .om-block {
    text-align: center;
    margin-bottom: 4px;
  }
  .om-symbol {
    font-size: 52px;
    color: #f5c842;
    text-shadow: 0 0 20px rgba(245,200,66,0.7), 0 0 40px rgba(245,200,66,0.3);
    line-height: 1;
  }

  /* Telugu title */
  .telugu-title {
    text-align: center;
    font-family: 'Noto Serif Telugu', serif;
    font-size: 36px;
    font-weight: 700;
    color: #fde68a;
    text-shadow: 0 0 15px rgba(253,230,138,0.5);
    margin-bottom: 2px;
    letter-spacing: 2px;
  }

  /* English title */
  .main-title {
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 30px;
    font-weight: 900;
    color: #f5c842;
    text-shadow: 0 0 20px rgba(245,200,66,0.6);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8860a, transparent);
  }
  .divider-gem {
    width: 8px; height: 8px;
    background: #f5c842;
    transform: rotate(45deg);
    box-shadow: 0 0 8px #f5c842;
  }

  /* Hosts */
  .hosts-block {
    text-align: center;
    margin: 8px 0 10px;
  }
  .hosts-label {
    font-size: 13px;
    color: #c8860a;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .hosts-name {
    font-family: 'Yatra One', cursive;
    font-size: 24px;
    color: #fde68a;
    text-shadow: 0 0 10px rgba(253,230,138,0.4);
  }
  .parents-name {
    font-size: 15px;
    color: #d4a855;
    font-style: italic;
    margin-top: 3px;
  }

  /* Main image / lamp area */
  .lamp-area {
    text-align: center;
    margin: 10px 0 8px;
    position: relative;
  }
  .lamp-svg-wrap {
    display: inline-block;
    position: relative;
  }
  .lamp-glow {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,60,0.55) 0%, transparent 70%);
    animation: flicker 2s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    0% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.15); }
  }

  /* Details cards */
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0;
  }
  .detail-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,134,10,0.4);
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    position: relative;
  }
  .detail-card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 2px;
    background: #c8860a;
  }
  .detail-icon {
    font-size: 20px;
    margin-bottom: 3px;
  }
  .detail-label {
    font-size: 10px;
    color: #c8860a;
    text-transform: uppercase;
    letter-spacing: 3px;
    display: block;
    margin-bottom: 4px;
  }
  .detail-value {
    font-size: 15px;
    color: #fde68a;
    font-weight: 600;
    line-height: 1.3;
  }
  .detail-sub {
    font-size: 12px;
    color: #d4a855;
    margin-top: 2px;
  }

  /* Schedule */
  .schedule {
    border: 1px solid rgba(200,134,10,0.35);
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
    padding: 14px 20px;
    margin: 8px 0;
  }
  .schedule-title {
    text-align: center;
    font-size: 11px;
    color: #c8860a;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .schedule-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .schedule-time {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    color: #f5c842;
    min-width: 70px;
  }
  .schedule-dot {
    width: 6px; height: 6px;
    background: #c8860a;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .schedule-event {
    font-size: 14px;
    color: #fde68a;
  }

  /* Venue */
  .venue-block {
    text-align: center;
    margin: 8px 0 6px;
    padding: 12px;
    border: 1px solid rgba(200,134,10,0.3);
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
  }
  .venue-label {
    font-size: 10px;
    color: #c8860a;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 5px;
  }
  .venue-name {
    font-family: 'Yatra One', cursive;
    font-size: 20px;
    color: #fde68a;
  }
  .venue-address {
    font-size: 13px;
    color: #d4a855;
    margin-top: 4px;
    font-style: italic;
  }

  /* Bottom blessing */
  .blessing {
    text-align: center;
    font-family: 'Noto Serif Telugu', serif;
    font-size: 16px;
    color: #c8860a;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  .bottom-floral {
    text-align: center;
    font-size: 22px;
    color: #c8860a;
    letter-spacing: 6px;
    margin-top: 8px;
    opacity: 0.8;
  }
</style>
</head>
<body>

  <div class="bg-pattern"></div>
  <div class="inner-border"></div>
